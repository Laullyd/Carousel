<!DOCTYPE html>
<html>
  <head>
    <title>Automatic Slideshow (In)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      * {box-sizing: border-box;}
      body {font-family: Verdana, sans-serif; margin:0}
      img {vertical-align: middle;}
      /* Slideshow container */
      #slideshow-container {
        height: 500px;
        width: 100%;
        position: relative;
        margin: auto;
        overflow: hidden;
      }
      .mySlides {
        position: absolute;
        width: 100%;
      }
      .mySlides img {
        height: 500px;
      }
      .slide-away-l {
        animation: slide-away-l .5s ease-in-out;
      }
      .slide-into-l {
        animation: slide-into-l .5s ease-in-out;
      }
      @keyframes slide-away-l {
        from {left: 0} 
        to {left: -100%;}
      }
      @keyframes slide-into-l {
        from {left: 100%} 
        to {left: 0}
      }
      .slide-away-r {
        animation: slide-away-r .5s ease-in-out;
      }
      .slide-into-r {
        animation: slide-into-r .5s ease-in-out;
      }
      @keyframes slide-away-r {
        from {left: 0} 
        to {left: 100%;}
      }
      @keyframes slide-into-r {
        from {left: -100%} 
        to {left: 0}
      }
      /* Caption text */
      .text {
        color: #f2f2f2;
        font-size: 15px;
        font-weight: bold;
        padding: 8px 12px;
        position: absolute;
        bottom: 8px;
        width: 100%;
        text-align: center;
      }
      /* Number text (1/3 etc) */
      .numbertext {
        color: #f2f2f2;
        font-size: 12px;
        padding: 8px 12px;
        position: absolute;
        top: 0;
      }
      .dots {
        z-index: 1;
        position: absolute;
        top: 521px;
        left: 50%;
        transform: translate(-50%);
      }
      /* The dots/bullets/indicators */
      .dot {
        height: 15px;
        width: 15px;
        margin: 0 2px;
        background-color: #bbb;
        border-radius: 50%;
        display: inline-block;
        cursor: pointer;
        transition: background-color 0.6s ease;
      }
      .active-for-dots {
        background-color: #4e4e4e;
      }
      /* On smaller screens, decrease text size */
      @media only screen and (max-width: 450px) {
        #slideshow-container {
          height: 300px;
        }
        .mySlides img {
          height: 300px;
        }
        .dots {
          top: 310px;
        }
        body {font-size: 90%}
      }
    </style>
  </head>
  <body>
    <div id="slideshow-container">
      <div class="mySlides">
        <div class="numbertext">1 / 3</div>
        <img src="Laully_webDev_projects_pics/img_nature_wide.jpg" alt="nature" style="width:100%">
        <div class="text">Nature</div>
      </div>
      <div class="mySlides">
        <div class="numbertext">2 / 3</div>
        <img src="Laully_webDev_projects_pics/img_snow_wide.jpg" alt="snow" style="width:100%">
        <div class="text">Snow</div>
      </div>
      <div class="mySlides">
        <div class="numbertext">3 / 3</div>
        <img src="Laully_webDev_projects_pics/img_mountains_wide.jpg" alt="mountains" style="width:100%">
        <div class="text">Mountains</div>
      </div>
    </div>
    <br>
    <div class="dots">
      <span class="dot" onclick="selectSlide(0)"></span> 
      <span class="dot" onclick="selectSlide(1)"></span> 
      <span class="dot" onclick="selectSlide(2)"></span> 
    </div>
    <h2>Automatic Slideshow</h2>
    <p>Slide in a new Image every 6 seconds:</p>
    <p id="dama"></p>
    <p id="dame"></p>
    <p id="dami"></p>
    <p id="damo"></p>
    <script>
      let slidesCont = document.getElementById('slideshow-container');
      let slides = document.getElementsByClassName("mySlides");
      let dots = document.getElementsByClassName("dot");
      let oneSlide = document.querySelector('.mySlides');
      let index = 0;
      let prevIndex;
      let slideshowTimer;
      let slideshowTimer2;
      // For the selectSlide()
      function selectSlide(ind) {
        clearTimeout(slideshowTimer);
        index = ind;
        slideOver();
      }
      let indexx;
      prevIndex = (index - 1 + slides.length) % slides.length;
      document.getElementById('dama').innerHTML = `Previous index: ${prevIndex}`;
      // When user swipes left or right
      let touchStartX = 0;
      let touchEndX = 0;
      slidesCont.addEventListener('touchstart', function(e) {
        touchStartX =  e.changedTouches[0].clientX;
      });
      slidesCont.addEventListener('touchend', function(e) {
        touchEndX = e.changedTouches[0].clientX;
        handleSwipe();
      });
      function handleSwipe() {
        let swipeDistance = touchEndX - touchStartX;
        if (swipeDistance < -50) {
          swipeLeft();
        } else if (swipeDistance > 50) {
          swipeRight();
        }
      }
      function swipeLeft() {
        clearTimeout(slideshowTimer);
        slideOver();
      }
      function swipeRight() {
        clearTimeout(slideshowTimer);
        for (let i = 0; i < dots.length; i++) {
          dots[i].className = dots[i].className.replace(" active-for-dots", "");
        }
        for (let i = 0; i < slides.length; i++) {
          slides[i].classList.remove('slide-away-r');
          slides[i].classList.remove('slide-into-r');
          slides[i].classList.remove('slide-away-l');
          slides[i].classList.remove('slide-into-l');
        }
        index = indexx;
        index--;
        prevIndex = (index - 1 + slides.length) % slides.length;
        if (index < 0) {
          index = slides.length - 1;
        }
        dots[index].className += " active-for-dots";
        document.getElementById('dami').innerHTML = `Active slide after decrement before swipeRight execution: ${activeSlide.children[1].alt}`;
        activeSlide.classList.add('slide-away-r');
        activeSlide.style.left = '100%';
        activeSlide.classList.remove('active');
        slides[index].classList.add('slide-into-r');
        slides[index].style.left = '0px';
        slides[index].classList.add('active');
        activeSlide = slidesCont.querySelector('.active');
        document.getElementById('damo').innerHTML = `Current slide after swipeRight execution: ${slides[index].children[1].alt}`;
        document.getElementById('dama').innerHTML = `Active slide after swipeRight execution: ${activeSlide.children[1].alt}`;
        document.getElementById('dame').innerHTML = `Previous slide: ${slides[prevIndex].children[1].alt}`;
        slideshowTimer2 = setTimeout(slideOver, 500);
      }
      // For the slideOver()
      slides[0].classList.add('active');
      for (let i = 0; i < slides.length; i++) {
        slides[i].style.left = (i == 0) ? '0' : '100%';
      }
      dots[0].className += " active-for-dots";
      let activeSlide;
      let activeSlideImg;
      slideOver();
      function slideOver() {
        if (index == slides.length) {
          index = 0;
        }
        for (let i = 0; i < dots.length; i++) {
          dots[i].className = dots[i].className.replace(" active-for-dots", "");
        }
        dots[index].className += " active-for-dots";
        for (let i = 0; i < slides.length; i++) {
          slides[i].classList.remove('slide-away-l');
          slides[i].classList.remove('slide-into-l');
          slides[i].classList.remove('slide-away-r');
          slides[i].classList.remove('slide-into-r');
        }
        activeSlide = slidesCont.querySelector('.active');
        activeSlideImg = activeSlide.getElementsByTagName('img')[0];
        document.getElementById('dame').innerHTML = `Current slide in slideOver: ${slides[index].children[1].alt}`;
        if (!slides[index].isSameNode(activeSlide)) {
          activeSlide.classList.add('slide-away-l');
          activeSlide.style.left = '-100%';
          activeSlide.classList.remove('active');
          slides[index].classList.add('slide-into-l');
          slides[index].style.left = '0px';
          slides[index].classList.add('active');
        }
        activeSlide = slidesCont.querySelector('.active');
        activeSlideImg = activeSlide.getElementsByTagName('img')[0];
        index++;
        indexx = index - 1;
        slideshowTimer = setTimeout(slideOver, 6000);
      }
    </script>
  </body>
</html>
